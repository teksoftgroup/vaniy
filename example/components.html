<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaniy Components</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        padding: 2rem;
      }

      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
      h2 { font-size: 0.8rem; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }

      .page { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.25rem; }

      /* AddTask */
      .add-task { background: #fff; border: 1px solid #e2e2e2; border-radius: 10px; padding: 1rem; display: flex; gap: 0.5rem; }
      .add-task input { flex: 1; border: 1px solid #d5d5d5; border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.9rem; outline: none; }
      .add-task input:focus { border-color: #4f46e5; }
      .add-task button { background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer; }
      .add-task button:hover { background: #4338ca; }

      /* Stats */
      .stats { display: flex; gap: 1rem; }
      .stat { flex: 1; background: #fff; border: 1px solid #e2e2e2; border-radius: 10px; padding: 0.875rem 1rem; text-align: center; }
      .stat .value { font-size: 1.75rem; font-weight: 700; color: #4f46e5; }
      .stat .caption { font-size: 0.72rem; color: #aaa; margin-top: 0.1rem; }

      /* TaskList */
      .task-list { background: #fff; border: 1px solid #e2e2e2; border-radius: 10px; padding: 1rem; }
      .task-list ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
      .task-list .empty { color: #bbb; font-size: 0.85rem; text-align: center; padding: 1.25rem 0; }

      /* TaskItem */
      .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.45rem 0.5rem; border-radius: 6px; }
      .task-item:hover { background: #f9f9f9; }
      .task-item input[type="checkbox"] { width: 1rem; height: 1rem; cursor: pointer; accent-color: #4f46e5; flex-shrink: 0; }
      .task-item .label { flex: 1; font-size: 0.9rem; transition: color 0.15s; }
      .task-item .label.done { text-decoration: line-through; color: #bbb; }
      .task-item .del { background: none; border: none; color: #d5d5d5; font-size: 1.1rem; cursor: pointer; padding: 0 0.2rem; line-height: 1; }
      .task-item .del:hover { color: #e53e3e; }

      /* EventLog */
      .event-log { background: #1c1c1c; color: #7ee787; border-radius: 10px; padding: 1rem; font-family: monospace; font-size: 0.78rem; }
      .event-log h2 { color: #555; }
      .event-log ul { list-style: none; display: flex; flex-direction: column; gap: 0.2rem; max-height: 110px; overflow-y: auto; margin-top: 0.5rem; }
      .event-log li::before { content: "› "; color: #4f46e5; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Task Board</h1>
      <div id="add-task"></div>
      <div id="stats"></div>
      <div id="task-list"></div>
      <div id="event-log"></div>
    </div>

    <script src="../dist/vaniy.js"></script>
    <script>
      const { mount, signal, effect, tag, bindText } = vaniy;

      // ── Shared state (lives on the page, passed as props) ─────────────────

      let nextId = 1;
      const tasks    = signal([]);   // [{ id, text, done }]
      const logLines = signal([]);   // string[]

      function pushLog(msg) {
        logLines.val = [msg, ...logLines.val].slice(0, 30);
      }

      // ─────────────────────────────────────────────────────────────────────
      // AddTask
      //   Props  : —
      //   Emits  : "add"  → text string
      // ─────────────────────────────────────────────────────────────────────
      function AddTask(props, ctx) {
        let inputEl;

        const submit = () => {
          const text = inputEl.elt.value.trim();
          if (!text) return;
          ctx.emit("add", text);
          inputEl.elt.value = "";
          inputEl.elt.focus();
        };

        return tag("div").css("add-task").child(
          tag("input")
            .attr("type", "text")
            .attr("placeholder", "New task…")
            .ref(el => (inputEl = el))
            .on("keydown", e => { if (e.key === "Enter") submit(); }),
          tag("button").text("Add").on("click", submit),
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      // Stats
      //   Props  : tasks  (signal)
      //   Emits  : —
      // ─────────────────────────────────────────────────────────────────────
      function Stats(props, ctx) {
        let totalEl, doneEl;

        ctx.onMount(() =>
          effect(() => {
            const all  = props.tasks.val;
            const done = all.filter(t => t.done).length;
            totalEl.elt.textContent = all.length;
            doneEl.elt.textContent  = done;
          }),
        );

        return tag("div").css("stats").child(
          tag("div").css("stat").child(
            tag("div").css("value").text("0").ref(el => (totalEl = el)),
            tag("div").css("caption").text("Total"),
          ),
          tag("div").css("stat").child(
            tag("div").css("value").text("0").ref(el => (doneEl = el)),
            tag("div").css("caption").text("Done"),
          ),
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      // TaskItem
      //   Props  : id, text, done
      //   Emits  : "toggle" → { id, done }
      //            "remove" → id
      // ─────────────────────────────────────────────────────────────────────
      function TaskItem(props, ctx) {
        const done = signal(props.done ?? false);

        const toggle = () => {
          done.val = !done.val;
          ctx.emit("toggle", { id: props.id, done: done.val });
        };

        return tag("li").css("task-item").child(
          tag("input").attr("type", "checkbox").prop("checked", done).on("change", toggle),
          tag("span").css("label").text(props.text).classIf("done", done),
          tag("button").css("del").text("×").on("click", () => ctx.emit("remove", props.id)),
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      // TaskList
      //   Props  : tasks  (signal)
      //   Emits  : "toggle" → { id, done }  (bubbled from TaskItem)
      //            "remove" → id             (bubbled from TaskItem)
      // ─────────────────────────────────────────────────────────────────────
      function TaskList(props, ctx) {
        let listEl;
        const mountedItems = []; // track child instances for cleanup

        ctx.onMount(() => {
          const stopEffect = effect(() => {
            mountedItems.forEach(i => i.destroy());
            mountedItems.length = 0;
            listEl.elt.innerHTML = "";

            const all = props.tasks.val;
            if (!all.length) {
              const p = document.createElement("p");
              p.className = "empty";
              p.textContent = "No tasks yet — add one above.";
              listEl.elt.appendChild(p);
              return;
            }

            all.forEach(task => {
              const item = mount(TaskItem, listEl.elt, {
                id:   task.id,
                text: task.text,
                done: task.done,
              });
              item.on("toggle", data => ctx.emit("toggle", data));
              item.on("remove", id   => ctx.emit("remove", id));
              mountedItems.push(item);
            });
          });

          return [stopEffect, () => mountedItems.forEach(i => i.destroy())];
        });

        return tag("div").css("task-list").child(
          tag("h2").text("Tasks"),
          tag("ul").ref(el => (listEl = el)),
        );
      }

      // ─────────────────────────────────────────────────────────────────────
      // EventLog
      //   Props  : lines  (signal)
      //   Emits  : —
      // ─────────────────────────────────────────────────────────────────────
      function EventLog(props, ctx) {
        let listEl;

        ctx.onMount(() =>
          effect(() => {
            listEl.elt.innerHTML = "";
            props.lines.val.forEach(msg => {
              const li = document.createElement("li");
              li.textContent = msg;
              listEl.elt.appendChild(li);
            });
          }),
        );

        return tag("div").css("event-log").child(
          tag("h2").text("Event log"),
          tag("ul").ref(el => (listEl = el)),
        );
      }

      // ── Wire everything together ──────────────────────────────────────────

      const addInst  = mount(AddTask,  "#add-task");
      const listInst = mount(TaskList, "#task-list", { tasks });
      mount(Stats,    "#stats",     { tasks });
      mount(EventLog, "#event-log", { lines: logLines });

      // AddTask → update shared state
      addInst.on("add", text => {
        tasks.val = [...tasks.val, { id: nextId++, text, done: false }];
        pushLog(`add    "${text}"`);
      });

      // TaskList → update shared state
      listInst.on("toggle", ({ id, done }) => {
        tasks.val = tasks.val.map(t => t.id === id ? { ...t, done } : t);
        pushLog(`toggle #${id} → ${done ? "✓ done" : "open"}`);
      });

      listInst.on("remove", id => {
        tasks.val = tasks.val.filter(t => t.id !== id);
        pushLog(`remove #${id}`);
      });
    </script>
  </body>
</html>
