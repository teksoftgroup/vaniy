<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo — Vaniy</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        padding: 2rem;
      }

      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
      h2 { font-size: 0.8rem; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }

      .page { max-width: 520px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.25rem; }

      /* AddTask */
      .add-task { background: #fff; border: 1px solid #e2e2e2; border-radius: 10px; padding: 1rem; display: flex; gap: 0.5rem; }
      .add-task input { flex: 1; border: 1px solid #d5d5d5; border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.9rem; outline: none; }
      .add-task input:focus { border-color: #4f46e5; }
      .add-task button { background: #4f46e5; color: #fff; border: none; border-radius: 6px; padding: 0.5rem 1rem; font-size: 0.9rem; cursor: pointer; }
      .add-task button:hover { background: #4338ca; }

      /* Stats */
      .stats { display: flex; gap: 1rem; }
      .stat { flex: 1; background: #fff; border: 1px solid #e2e2e2; border-radius: 10px; padding: 0.875rem 1rem; text-align: center; }
      .stat .value { font-size: 1.75rem; font-weight: 700; color: #4f46e5; }
      .stat .caption { font-size: 0.72rem; color: #aaa; margin-top: 0.1rem; }

      /* TaskList */
      .task-list { background: #fff; border: 1px solid #e2e2e2; border-radius: 10px; padding: 1rem; }
      .task-list ul { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; }
      .task-list .empty { color: #bbb; font-size: 0.85rem; text-align: center; padding: 1.25rem 0; }

      /* TaskItem */
      .task-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.45rem 0.5rem; border-radius: 6px; }
      .task-item:hover { background: #f9f9f9; }
      .task-item input[type="checkbox"] { width: 1rem; height: 1rem; cursor: pointer; accent-color: #4f46e5; flex-shrink: 0; }
      .task-item .label { flex: 1; font-size: 0.9rem; transition: color 0.15s; }
      .task-item .label.done { text-decoration: line-through; color: #bbb; }
      .task-item .del { background: none; border: none; color: #d5d5d5; font-size: 1.1rem; cursor: pointer; padding: 0 0.2rem; line-height: 1; }
      .task-item .del:hover { color: #e53e3e; }

      /* EventLog */
      .event-log { background: #1c1c1c; color: #7ee787; border-radius: 10px; padding: 1rem; font-family: monospace; font-size: 0.78rem; }
      .event-log h2 { color: #555; }
      .event-log ul { list-style: none; display: flex; flex-direction: column; gap: 0.2rem; max-height: 110px; overflow-y: auto; margin-top: 0.5rem; }
      .event-log li::before { content: "› "; color: #4f46e5; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      import { mount }    from "../src/index.js";
      import { TodoPage } from "./pages/todo.page.js";

      mount(TodoPage, "#app");
    </script>
  </body>
</html>
